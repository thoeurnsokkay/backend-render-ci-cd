name: Build, Push, and Auto-Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Build and Push Docker Image to GHCR via Jib
        run: |
          ./mvnw compile jib:build \
            -Djib.to.image=ghcr.io/thoeurnsokkay/thoeurnsokkay/backend-render-ci-cd:latest \
            -Djib.to.auth.username=${{ github.actor }} \
            -Djib.to.auth.password=${{ secrets.RENDER_TOKEN }}

      - name: Trigger Render CD Deployment
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}